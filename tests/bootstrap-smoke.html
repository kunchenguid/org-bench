<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Bootstrap Smoke Test</title>
</head>
<body>
  <div id="results">Running bootstrap smoke test...</div>
  <script src="../scripts/store.js"></script>
  <script src="../scripts/events.js"></script>
  <script src="../scripts/bootstrap.js"></script>
  <script>
    (function () {
      var failures = [];

      function expect(condition, message) {
        if (!condition) {
          failures.push(message);
        }
      }

      expect(window.SpreadsheetStore && typeof window.SpreadsheetStore.createStore === 'function', 'createStore contract should exist');
      expect(window.SpreadsheetEvents && typeof window.SpreadsheetEvents.createEventBus === 'function', 'createEventBus contract should exist');
      expect(window.SpreadsheetBootstrap && typeof window.SpreadsheetBootstrap.bootstrap === 'function', 'bootstrap contract should exist');

      var result = document.getElementById('results');
      if (failures.length) {
        result.textContent = 'FAIL: ' + failures.join(' | ');
        result.setAttribute('data-status', 'fail');
        throw new Error(result.textContent);
      }

      result.textContent = 'PASS';
      result.setAttribute('data-status', 'pass');
    }());
  </script>
</body>
</html>

<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Grid</title>
    <link rel="stylesheet" href="styles.css">
  </head>
  <body>
    <div class="app-shell">
      <header class="topbar">
        <div class="brand-block">
          <div class="brand">Grid</div>
          <div class="subtitle">Fast local spreadsheet</div>
        </div>
        <div class="formula-panel">
          <label class="name-box-label" for="formula-input">Cell</label>
          <div class="name-box" id="selected-cell-label">A1</div>
          <label class="formula-label" for="formula-input">fx</label>
          <input id="formula-input" class="formula-input" type="text" spellcheck="false" autocomplete="off">
        </div>
      </header>
      <main class="sheet-frame">
        <div class="sheet-grid-wrap">
          <table class="sheet-grid" id="sheet-grid" aria-label="Spreadsheet"></table>
        </div>
      </main>
    </div>
    <script src="src/formula.js"></script>
    <script src="src/spreadsheet-state.js"></script>
    <script src="app.js"></script>
  </body>
  </html>

<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Grid</title>
    <link rel="stylesheet" href="styles.css">
  </head>
  <body>
    <main class="app-shell">
      <header class="topbar">
        <div>
          <p class="eyebrow">Apple</p>
          <h1>Grid</h1>
        </div>
        <p class="hint">Drag to select. Shift extends. Delete clears. Standard copy, cut, and paste work on the highlighted block.</p>
      </header>
      <section class="sheet-frame">
        <div class="sheet-scroll">
          <table class="sheet" id="sheet"></table>
        </div>
      </section>
    </main>
    <script src="spreadsheet-core.js"></script>
    <script src="app.js"></script>
  </body>
</html>

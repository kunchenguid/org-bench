<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Microsoft Sheet</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <header class="topbar">
    <div class="brand">Microsoft Sheet</div>
    <div id="nameBox" class="name-box">A1</div>
    <input id="formulaBar" class="formula-bar" aria-label="Formula bar" autocomplete="off">
    <div class="actions" aria-label="Sheet actions">
      <button id="insertRow">Insert row above</button>
      <button id="deleteRow">Delete row</button>
      <button id="insertCol">Insert column left</button>
      <button id="deleteCol">Delete column</button>
      <button id="undoBtn">Undo</button>
      <button id="redoBtn">Redo</button>
    </div>
  </header>
  <main id="sheetWrap" class="sheet-wrap" tabindex="0" aria-label="Spreadsheet grid">
    <table id="grid" class="grid" aria-label="Spreadsheet"></table>
  </main>
  <script src="spreadsheet.js"></script>
  <script src="app.js"></script>
</body>
</html>

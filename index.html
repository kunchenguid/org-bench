<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Spreadsheet</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <header class="toolbar">
    <div class="brand">Sheet</div>
    <div id="cellName" class="cell-name">A1</div>
    <input id="formulaBar" class="formula-bar" aria-label="Formula bar" spellcheck="false">
    <div class="hint">Enter commits, Esc cancels, Shift+arrows selects, Ctrl/Cmd+Z undo</div>
  </header>
  <main id="sheet" class="sheet" aria-label="Spreadsheet grid"></main>
  <script src="app.js"></script>
</body>
</html>

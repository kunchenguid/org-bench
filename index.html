<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Local Spreadsheet</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <main class="app" aria-label="Spreadsheet">
    <section class="toolbar" aria-label="Formula editor">
      <div class="brand">Sheet</div>
      <label class="name-box" for="formula-input" id="cell-name">A1</label>
      <input id="formula-input" class="formula-input" autocomplete="off" spellcheck="false" aria-label="Formula bar">
      <div class="hint">Enter edits, Tab moves right, Shift+arrows select, Delete clears</div>
    </section>
    <section class="sheet-wrap" id="sheet-wrap" tabindex="0" aria-label="Spreadsheet grid">
      <table id="grid" class="grid" aria-label="Spreadsheet cells"></table>
    </section>
  </main>
  <script src="app.js"></script>
</body>
</html>

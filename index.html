<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Sheet</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <main class="app" aria-label="Spreadsheet">
    <header class="toolbar">
      <div class="brand">Sheet</div>
      <label class="namebox" for="cell-name">Cell</label>
      <input id="cell-name" class="cell-name" readonly value="A1">
      <label class="formula-label" for="formula-bar">fx</label>
      <input id="formula-bar" class="formula-bar" autocomplete="off" spellcheck="false" aria-label="Formula bar">
      <div class="hint">Enter edit · Tab right · Shift+arrows select · right-click headers</div>
    </header>
    <section id="sheet-wrap" class="sheet-wrap">
      <table id="sheet" class="sheet" aria-label="Spreadsheet grid"></table>
    </section>
  </main>
  <div id="context-menu" class="context-menu" hidden></div>
  <script src="app.js"></script>
</body>
</html>

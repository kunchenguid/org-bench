<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Sheet</title>
    <link rel="stylesheet" href="styles.css">
  </head>
  <body>
    <main class="app-shell" aria-label="Spreadsheet shell">
      <header class="formula-bar-panel">
        <div class="formula-bar-chrome">
          <div class="name-box" aria-label="Selected cell">A1</div>
          <label class="formula-field" aria-label="Formula bar">
            <span class="formula-field__symbol">fx</span>
            <input
              class="formula-input"
              data-formula-input
              type="text"
              spellcheck="false"
              placeholder="Select a cell to edit its raw contents"
              aria-label="Formula bar input"
            >
          </label>
        </div>
        <p class="formula-bar-hint">Enter to commit, Tab to move across, double-click or F2 to edit.</p>
      </header>

      <section class="sheet-frame" aria-label="Spreadsheet grid">
        <div class="sheet-surface">
          <div class="sheet-grid" role="presentation">
            <div class="sheet-corner" data-grid-corner aria-hidden="true"></div>
            <div class="column-headers" data-column-headers role="row"></div>
            <div class="row-headers" data-row-headers></div>
            <div class="cell-grid" data-cell-grid role="grid" aria-label="Cells"></div>
          </div>
        </div>
      </section>

      <div class="sheet-context-menu" data-sheet-context-menu hidden aria-hidden="true">
        <p class="sheet-context-menu__label" data-sheet-context-label>Row actions</p>
        <div class="sheet-context-menu__actions" data-sheet-context-actions></div>
        <div class="sheet-context-menu__divider" role="separator"></div>
        <p class="sheet-context-menu__footnote">Control-click a header or use the more button for row and column actions.</p>
      </div>
    </main>

    <script src="src/header-controls.js"></script>
    <script>
      (function renderShell() {
        const rows = 100;
        const columns = 26;
        const shell = document.querySelector('.app-shell');
        const columnHeaders = document.querySelector('[data-column-headers]');
        const rowHeaders = document.querySelector('[data-row-headers]');
        const cellGrid = document.querySelector('[data-cell-grid]');
        const contextMenu = document.querySelector('[data-sheet-context-menu]');
        const contextLabel = document.querySelector('[data-sheet-context-label]');
        const contextActions = document.querySelector('[data-sheet-context-actions]');

        const alphabet = Array.from({ length: columns }, (_, index) =>
          String.fromCharCode(65 + index)
        );

        function createHeaderAffordance(axis, index, label) {
          const header = document.createElement('div');
          const axisLabel = axis === 'column' ? 'column' : 'row';
          header.className = axis + '-header';
          header.dataset.headerAxis = axis;
          header.dataset.headerIndex = String(index);
          header.tabIndex = 0;
          header.setAttribute('aria-label', label + ' ' + axisLabel + ' header');

          const title = document.createElement('span');
          title.className = 'header-title';
          title.textContent = label;

          const button = document.createElement('button');
          button.className = 'header-affordance';
          button.type = 'button';
          button.dataset.headerAffordance = 'true';
          button.setAttribute('aria-label', 'Open ' + axisLabel + ' actions for ' + label);
          button.innerHTML = '<span aria-hidden="true">...</span>';

          header.appendChild(title);
          header.appendChild(button);
          return header;
        }

        for (const columnName of alphabet) {
          const header = createHeaderAffordance('column', alphabet.indexOf(columnName) + 1, columnName);
          header.dataset.column = columnName;
          columnHeaders.appendChild(header);
        }

        for (let row = 1; row <= rows; row += 1) {
          const rowHeader = createHeaderAffordance('row', row, String(row));
          rowHeader.dataset.row = String(row);
          rowHeaders.appendChild(rowHeader);

          for (const columnName of alphabet) {
            const cell = document.createElement('div');
            const inPreviewRange = row <= 3 && alphabet.indexOf(columnName) <= 2;
            cell.className = 'cell';
            cell.dataset.cell = columnName + row;
            cell.dataset.column = columnName;
            cell.dataset.row = String(row);
            cell.role = 'gridcell';
            cell.setAttribute('aria-label', columnName + row);

            if (inPreviewRange) {
              cell.classList.add('is-in-range');
            }

            if (columnName === 'A' && row === 1) {
              cell.classList.add('is-active');
              cell.classList.add('is-editing');
              cell.innerHTML = '<span class="cell-editor">123</span>';
            }

            cellGrid.appendChild(cell);
          }
        }

        HeaderControls.attachHeaderControls({
          root: shell,
          menu: contextMenu,
          actionList: contextActions,
          onAction(operation, action) {
            contextLabel.textContent = action.label;
            window.dispatchEvent(new CustomEvent('sheet:structural-action', {
              detail: {
                operation: operation,
                action: action,
              },
            }));

            if (window.sheetShell && typeof window.sheetShell.onStructuralAction === 'function') {
              window.sheetShell.onStructuralAction(operation, action);
            }
          },
        });
      }());
    </script>
    <script src="formula-engine.js"></script>
    <script src="src/spreadsheet-store.js"></script>
    <script src="src/editing.js"></script>
  </body>
</html>

<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Facebook Sheet</title>
    <link rel="stylesheet" href="./style.css">
  </head>
  <body>
    <div class="app-shell">
      <header class="topbar">
        <div>
          <p class="eyebrow">Facebook</p>
          <h1>Sheet</h1>
        </div>
        <p class="hint">Click a cell to edit. Press Enter to commit, F2 to edit in place.</p>
      </header>

      <section class="formula-panel">
        <label class="name-box" for="formula-input">A1</label>
        <input id="formula-input" class="formula-input" type="text" autocomplete="off" spellcheck="false">
      </section>

      <main class="sheet-frame">
        <div id="sheet-root" class="sheet-root" aria-label="Spreadsheet grid"></div>
      </main>
    </div>

    <script src="./spreadsheet-core.js"></script>
    <script src="./app.js"></script>
  </body>
</html>

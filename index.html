<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Facebook Spreadsheet</title>
    <link rel="stylesheet" href="styles.css">
  </head>
  <body>
    <div class="app-shell">
      <header class="topbar">
        <div class="brand">Sheets</div>
        <label class="formula-bar" for="formula-input">
          <span class="formula-label">fx</span>
          <input id="formula-input" type="text" autocomplete="off" spellcheck="false">
        </label>
      </header>
      <main class="grid-shell">
        <div id="spreadsheet" class="spreadsheet" aria-label="Spreadsheet grid"></div>
      </main>
    </div>
    <script src="spreadsheet-core.js"></script>
    <script src="app.js"></script>
  </body>
</html>

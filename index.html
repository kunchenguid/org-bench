<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Gridbook</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <main class="app" aria-label="Spreadsheet">
    <section class="topbar">
      <div class="brand">Gridbook</div>
      <label class="namebox" aria-label="Selected cell"><span id="cellName">A1</span></label>
      <input id="formulaBar" class="formula" aria-label="Formula bar" autocomplete="off" spellcheck="false">
      <div class="hint">Enter/F2 edit · Shift+arrows select · headers menu rows/cols</div>
    </section>
    <section id="sheetWrap" class="sheet-wrap" tabindex="0" aria-label="Spreadsheet grid">
      <table id="sheet" class="sheet" aria-label="Spreadsheet cells"></table>
    </section>
    <div id="menu" class="menu" hidden role="menu"></div>
  </main>
  <script src="spreadsheet.js"></script>
  <script src="app.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Amazon Sheet</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="app-shell">
    <header class="formula-panel">
      <div class="name-box" id="name-box">A1</div>
      <label class="formula-label" for="formula-input">fx</label>
      <input id="formula-input" class="formula-input" type="text" spellcheck="false" autocomplete="off">
    </header>
    <main class="grid-shell">
      <div id="grid-root" class="grid-root" aria-label="Spreadsheet"></div>
      <input id="cell-editor" class="cell-editor hidden" type="text" spellcheck="false" autocomplete="off">
    </main>
  </div>
  <script src="spreadsheet.js"></script>
  <script src="app.js"></script>
</body>
</html>

<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Sheet</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <main class="sheet-shell" aria-label="Spreadsheet">
    <header class="topbar">
      <div class="brand">Sheet</div>
      <div class="name-box" id="nameBox">A1</div>
      <input id="formulaBar" class="formula-bar" aria-label="Formula bar" autocomplete="off" spellcheck="false">
      <div class="hints">Enter/F2 edit · Shift+arrows select · right-click headers insert/delete</div>
    </header>
    <section id="grid" class="grid" tabindex="0" aria-label="Spreadsheet grid"></section>
    <div id="editor" class="cell-editor" hidden contenteditable="true" spellcheck="false"></div>
  </main>
  <script src="spreadsheet-core.js"></script>
  <script src="app.js"></script>
</body>
</html>

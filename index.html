<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Duel TCG</title>
    <link rel="stylesheet" href="./styles.css">
  </head>
  <body>
    <main class="app-shell">
      <canvas id="game-canvas" aria-label="Duel TCG game board"></canvas>
      <div class="boot-status" id="boot-status" role="status" aria-live="polite">
        <div class="boot-status__eyebrow">Astral Duel Protocol</div>
        <div class="boot-status__title">Solar League vs Umbral Synod</div>
        <div class="boot-status__copy">Initializing canvas duel...</div>
        <div class="boot-status__factions" aria-hidden="true">
          <img class="boot-status__sigil" src="./assets/art/factions/solar-league-sigil.svg" alt="">
          <span class="boot-status__versus">VS</span>
          <img class="boot-status__sigil" src="./assets/art/factions/umbral-synod-sigil.svg" alt="">
        </div>
      </div>
    </main>
    <script src="./script.js"></script>
  </body>
</html>

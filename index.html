<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Microsoft Sheet</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <main class="app" aria-label="Spreadsheet">
    <div class="toolbar">
      <div class="brand">Microsoft Sheet</div>
      <div id="cell-name" class="cell-name">A1</div>
      <input id="formula-bar" class="formula-bar" aria-label="Formula bar" autocomplete="off" spellcheck="false">
      <div class="hint">Enter/F2 edit · Shift+arrows select · Ctrl/Cmd+C/V/Z · right-click headers</div>
    </div>
    <div id="grid" class="grid" tabindex="0" aria-label="Spreadsheet grid"></div>
    <div id="menu" class="menu" hidden></div>
  </main>
  <script src="spreadsheet-core.js"></script>
  <script src="app.js"></script>
</body>
</html>

<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Oracle Sheet</title>
    <link rel="stylesheet" href="styles.css">
  </head>
  <body>
    <main class="app-shell" aria-label="Spreadsheet application">
      <header class="toolbar">
        <div class="brand-block">
          <span class="brand">Oracle Sheet</span>
          <span class="subtitle">Local-first spreadsheet</span>
        </div>
        <label class="formula-bar" for="formula-input">
          <span class="formula-label">fx</span>
          <input id="formula-input" type="text" autocomplete="off" spellcheck="false" aria-label="Formula bar">
        </label>
      </header>
      <section class="sheet-frame" aria-label="Spreadsheet grid">
        <div id="sheet-grid" class="sheet-grid" role="grid" aria-rowcount="100" aria-colcount="26"></div>
      </section>
    </main>
    <script>
      window.ORACLE_STORAGE_NAMESPACE = window.ORACLE_STORAGE_NAMESPACE || document.body.dataset.storageNamespace || '';
    </script>
    <script src="app-core.js"></script>
    <script src="range-selection.js"></script>
    <script src="app.js"></script>
  </body>
</html>

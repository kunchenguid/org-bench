<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Sheet</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <main class="app" aria-label="Spreadsheet">
    <div class="toolbar">
      <div class="brand">Sheet</div>
      <div id="nameBox" class="name-box">A1</div>
      <input id="formulaBar" class="formula-bar" aria-label="Formula bar" spellcheck="false" autocomplete="off">
      <div class="hint">Enter/F2 edit · Shift+arrows select · Ctrl/Cmd+C/V/Z</div>
    </div>
    <div id="grid" class="grid" role="grid" tabindex="0" aria-label="Spreadsheet grid"></div>
    <div id="contextMenu" class="context-menu" hidden></div>
  </main>
  <script src="spreadsheet-core.js"></script>
  <script src="app.js"></script>
</body>
</html>

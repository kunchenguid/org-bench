<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Quiet Sheet</title>
    <link rel="stylesheet" href="styles.css">
  </head>
  <body>
    <div class="app-shell">
      <header class="topbar">
        <div>
          <p class="eyebrow">Spreadsheet</p>
          <h1>Quiet Sheet</h1>
        </div>
        <div class="structure-actions" aria-label="Structure actions">
          <button type="button" data-structure-action="insert-row-above">+ Row Above</button>
          <button type="button" data-structure-action="insert-row-below">+ Row Below</button>
          <button type="button" data-structure-action="delete-row">- Row</button>
          <button type="button" data-structure-action="insert-col-left">+ Col Left</button>
          <button type="button" data-structure-action="insert-col-right">+ Col Right</button>
          <button type="button" data-structure-action="delete-col">- Col</button>
        </div>
        <label class="formula-wrap" for="formula-bar">
          <span class="formula-label">fx</span>
          <input id="formula-bar" autocomplete="off" spellcheck="false">
        </label>
      </header>
      <main class="grid-shell">
        <table id="sheet" aria-label="Spreadsheet grid"></table>
      </main>
    </div>
    <script src="app-state.js"></script>
    <script src="spreadsheet-core.js"></script>
    <script src="app.js"></script>
  </body>
</html>

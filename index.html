<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Facebook Spreadsheet</title>
    <link rel="stylesheet" href="styles.css">
  </head>
  <body>
    <div class="app-shell">
      <header class="toolbar">
        <div class="brand">Spreadsheet</div>
        <label class="formula-wrap" for="formula-bar">
          <span class="formula-label">fx</span>
          <input id="formula-bar" class="formula-bar" type="text" autocomplete="off" spellcheck="false">
        </label>
      </header>
      <main class="sheet-shell">
        <div id="grid" class="grid-wrap"></div>
      </main>
    </div>
    <script src="formula-engine.js"></script>
    <script src="app.js"></script>
  </body>
</html>

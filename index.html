<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Grid</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="app-shell">
    <header class="topbar">
      <div class="brand-block">
        <div class="brand">Grid</div>
        <div class="subtitle">Quick calculations, no setup.</div>
      </div>
      <div class="formula-panel">
        <label class="name-box" for="formula-input">A1</label>
        <div class="formula-input-wrap">
          <span class="formula-sigil">fx</span>
          <input id="formula-input" class="formula-input" type="text" autocomplete="off" spellcheck="false">
        </div>
      </div>
    </header>
    <main class="sheet-shell">
      <div id="sheet-container" class="sheet-container"></div>
    </main>
  </div>

  <script src="src/formula.js"></script>
  <script src="src/clipboard.js"></script>
  <script src="src/app.js"></script>
</body>
</html>

<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Apple Sheet</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="app-shell">
    <header class="topbar">
      <div>
        <p class="eyebrow">Apple</p>
        <h1>Sheet</h1>
      </div>
      <div class="selection-pill" id="name-box">A1</div>
    </header>

    <section class="formula-panel">
      <label class="formula-label" for="formula-input">fx</label>
      <input id="formula-input" class="formula-input" type="text" spellcheck="false" autocomplete="off">
    </section>

    <main class="grid-shell">
      <div id="grid-scroll" class="grid-scroll">
        <table id="sheet" class="sheet" aria-label="Spreadsheet"></table>
      </div>
    </main>
  </div>

  <script src="formula.js"></script>
  <script src="app.js"></script>
</body>
</html>

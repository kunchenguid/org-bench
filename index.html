<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Quiet Sheet</title>
    <link rel="stylesheet" href="styles.css">
  </head>
  <body>
    <div class="app-shell">
      <header class="topbar">
        <div>
          <p class="eyebrow">Spreadsheet</p>
          <h1>Quiet Sheet</h1>
        </div>
        <label class="formula-wrap" for="formula-bar">
          <span class="formula-label">fx</span>
          <input id="formula-bar" autocomplete="off" spellcheck="false">
        </label>
        <section class="structure-bar" aria-label="Row and column actions">
          <p class="structure-title">Structure</p>
          <p class="structure-target" id="structure-target">Row 1, Column A</p>
          <div class="structure-actions">
            <button type="button" data-structure-action="insert-row">Insert row</button>
            <button type="button" data-structure-action="delete-row">Delete row</button>
            <button type="button" data-structure-action="insert-column">Insert column</button>
            <button type="button" data-structure-action="delete-column">Delete column</button>
          </div>
        </section>
      </header>
      <main class="grid-shell">
        <table id="sheet" aria-label="Spreadsheet grid"></table>
      </main>
    </div>
    <script src="app-state.js"></script>
    <script src="spreadsheet-core.js"></script>
    <script src="app.js"></script>
  </body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Starfall Duel</title>
  <style>
    html, body {
      margin: 0;
      height: 100%;
      background: #02060c;
      overflow: hidden;
      font-family: Arial, sans-serif;
    }

    body {
      display: grid;
      place-items: center;
    }

    canvas {
      display: block;
      max-width: 100vw;
      max-height: 100vh;
      box-shadow: 0 18px 48px rgba(0, 0, 0, 0.45);
    }

    #status {
      position: fixed;
      left: 12px;
      bottom: 12px;
      padding: 8px 10px;
      background: rgba(4, 10, 18, 0.72);
      color: #d8e6f2;
      font-size: 12px;
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 999px;
      pointer-events: none;
    }
  </style>
</head>
<body>
  <canvas id="game" width="1280" height="720" aria-label="Starfall Duel gameplay canvas"></canvas>
  <div id="status">Loading duel...</div>
  <script src="src/game-state.js"></script>
  <script src="src/main.js"></script>
</body>
</html>

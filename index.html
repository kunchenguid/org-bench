<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Spreadsheet</title>
    <link rel="stylesheet" href="styles.css">
  </head>
  <body>
    <main class="app-shell" aria-label="Spreadsheet workspace">
      <section class="formula-bar" aria-label="Formula bar">
        <div class="name-box" aria-label="Active cell">B2</div>
        <label class="formula-input-wrap">
          <span class="formula-mark">fx</span>
          <input class="formula-input" value="=SUM(A1:A5)" aria-label="Selected cell contents">
        </label>
      </section>

      <section class="sheet-frame" aria-label="Sheet">
        <div class="sheet-grid" id="sheet-grid" role="grid" aria-rowcount="100" aria-colcount="26"></div>
      </section>

      <div class="visual-state-contract" aria-hidden="true">
        <span class="cell active"></span>
        <span class="cell range-selected"></span>
        <span class="cell number"></span>
        <span class="cell text"></span>
        <span class="cell error"></span>
      </div>
    </main>

    <script>
      (function renderVisualGrid() {
        var grid = document.getElementById('sheet-grid');
        var letters = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ'.split('');
        var fragment = document.createDocumentFragment();

        var corner = document.createElement('div');
        corner.className = 'corner-header';
        corner.setAttribute('aria-hidden', 'true');
        fragment.appendChild(corner);

        letters.forEach(function(letter) {
          var header = document.createElement('div');
          header.className = 'column-header';
          header.textContent = letter;
          fragment.appendChild(header);
        });

        for (var row = 1; row <= 100; row += 1) {
          var rowHeader = document.createElement('div');
          rowHeader.className = 'row-header';
          rowHeader.textContent = row;
          fragment.appendChild(rowHeader);

          letters.forEach(function(letter, index) {
            var cell = document.createElement('div');
            var address = letter + row;
            cell.className = 'cell';
            cell.dataset.address = address;
            cell.setAttribute('role', 'gridcell');
            cell.setAttribute('aria-label', address);

            if (address === 'B2') {
              cell.className = 'cell active number';
              cell.textContent = '42';
            } else if ((address === 'C2') || (address === 'D2') || (address === 'B3') || (address === 'C3') || (address === 'D3')) {
              cell.className = 'cell range-selected';
            } else if (address === 'A1') {
              cell.className = 'cell text';
              cell.textContent = 'Revenue';
            } else if (address === 'E2') {
              cell.className = 'cell error';
              cell.textContent = '#DIV/0!';
            } else if (row <= 5 && index === 0) {
              cell.className = 'cell number';
              cell.textContent = String(row * 10);
            }

            fragment.appendChild(cell);
          });
        }

        grid.appendChild(fragment);
      })();
    </script>
  </body>
</html>

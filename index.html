<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Gridline Spreadsheet</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <main class="app" aria-label="Spreadsheet">
    <section class="toolbar" aria-label="Formula toolbar">
      <strong class="brand">Gridline</strong>
      <span id="active-cell" class="name-box">A1</span>
      <span class="fx">fx</span>
      <input id="formula-input" aria-label="Formula bar" autocomplete="off" spellcheck="false">
      <button id="insert-row" type="button">Insert row above</button>
      <button id="delete-row" type="button">Delete row</button>
      <button id="insert-col" type="button">Insert column left</button>
      <button id="delete-col" type="button">Delete column</button>
    </section>
    <section id="grid" class="grid" tabindex="0" aria-label="Spreadsheet grid"></section>
  </main>
  <script src="spreadsheet-core.js"></script>
  <script src="app.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sheet</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="app-shell">
      <header class="topbar">
        <div class="brand">Sheet</div>
        <label class="formula-bar" for="formula-input">
          <span class="formula-label">fx</span>
          <input id="formula-input" type="text" autocomplete="off" spellcheck="false" />
        </label>
        <div class="structure-actions" aria-label="Structural edits">
          <button id="insert-row" type="button">+ Row</button>
          <button id="delete-row" type="button">- Row</button>
          <button id="insert-column" type="button">+ Col</button>
          <button id="delete-column" type="button">- Col</button>
        </div>
      </header>
      <section class="grid-panel">
        <div id="grid-scroll" class="grid-scroll">
          <table id="sheet" class="sheet" aria-label="Spreadsheet"></table>
          <input id="cell-editor" class="cell-editor" type="text" autocomplete="off" spellcheck="false" />
        </div>
      </section>
      <footer class="statusbar">
        <span id="selection-label">A1</span>
        <span id="status-label">Ready</span>
      </footer>
    </main>
    <script src="spreadsheet-core.js"></script>
    <script src="app.js"></script>
  </body>
</html>

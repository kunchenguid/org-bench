<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>QuickSheet</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <header class="topbar">
    <div class="brand">QuickSheet</div>
    <div class="formula-wrap">
      <span id="name-box" class="name-box">A1</span>
      <input id="formula" aria-label="Formula bar" autocomplete="off" spellcheck="false" placeholder="Select a cell and type a value or =SUM(A1:A5)">
    </div>
    <div class="tools" aria-label="Spreadsheet controls">
      <button data-action="undo" title="Undo (Ctrl/Cmd+Z)">Undo</button>
      <button data-action="redo" title="Redo (Ctrl/Cmd+Y)">Redo</button>
      <button data-action="insert-row-above">Row above</button>
      <button data-action="insert-row-below">Row below</button>
      <button data-action="delete-row">Delete row</button>
      <button data-action="insert-col-left">Col left</button>
      <button data-action="insert-col-right">Col right</button>
      <button data-action="delete-col">Delete col</button>
    </div>
  </header>
  <main id="sheet-wrap" class="sheet-wrap" aria-label="Spreadsheet grid"></main>
  <div id="hint" class="hint">Tip: right-click row or column headers for insert/delete. Shift+arrows extend selection. Copy/paste formulas shifts relative references.</div>
  <script src="spreadsheet-core.js"></script>
  <script src="app.js"></script>
</body>
</html>

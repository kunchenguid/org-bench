<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Oracle Spreadsheet UI Tests</title>
</head>
<body>
  <main id="test-root"></main>
  <pre id="results">Running...</pre>
  <script src="spreadsheet-core.js"></script>
  <script src="src/actions.js"></script>
  <script src="app.js"></script>
  <script>
    (function () {
      const results = document.getElementById('results');

      function assert(condition, message) {
        if (!condition) {
          throw new Error(message);
        }
      }

      function key(target, keyName, options) {
        target.dispatchEvent(new KeyboardEvent('keydown', Object.assign({
          key: keyName,
          bubbles: true,
          cancelable: true
        }, options || {})));
      }

      function editCell(root, cellName, value) {
        const cell = root.querySelector('[data-cell="' + cellName + '"]');
        cell.focus();
        key(cell, value.charAt(0));
        const editor = root.querySelector('.cell-editor');
        editor.value = value;
        key(editor, 'Enter');
      }

      function runHeaderAction(root, command, index, action) {
        const menu = root.querySelector('[data-command="' + command + '"][data-' + (command === 'row-menu' ? 'row' : 'col') + '="' + index + '"]');
        menu.dispatchEvent(new MouseEvent('click', { bubbles: true, cancelable: true }));
        const item = root.querySelector('[data-menu-action="' + action + '"]');
        assert(item, 'header menu exposes ' + action);
        item.dispatchEvent(new MouseEvent('click', { bubbles: true, cancelable: true }));
      }

      function run() {
        assert(window.OracleSpreadsheet, 'OracleSpreadsheet namespace exists');
        assert(typeof window.OracleSpreadsheet.createApp === 'function', 'createApp exists');
        assert(window.SpreadsheetCore && window.SpreadsheetActions, 'core and actions scripts load under file');

        const root = document.getElementById('test-root');
        localStorage.removeItem('oracle-ui-test:spreadsheet-state');
        const app = window.OracleSpreadsheet.createApp(root, {
          rows: 100,
          cols: 26,
          storageKey: 'oracle-ui-test'
        });

        const cells = root.querySelectorAll('[role="gridcell"]');
        assert(cells.length === 2600, 'renders 26 by 100 grid cells');

        const a1 = root.querySelector('[data-cell="A1"]');
        assert(a1, 'renders A1 cell');
        assert(a1.getAttribute('aria-selected') === 'true', 'A1 starts selected');

        const formulaInput = root.querySelector('#formula-input');
        assert(formulaInput && formulaInput.getAttribute('aria-label'), 'formula bar has labeled input');
        assert(formulaInput.value === '', 'formula bar starts empty');

        const columnMenu = root.querySelector('[data-command="column-menu"]');
        const rowMenu = root.querySelector('[data-command="row-menu"]');
        assert(columnMenu && columnMenu.getAttribute('aria-label').indexOf('Column A') !== -1, 'column header exposes command affordance');
        assert(rowMenu && rowMenu.getAttribute('aria-label').indexOf('Row 1') !== -1, 'row header exposes command affordance');

        a1.focus();
        key(a1, '7');
        const editor = root.querySelector('.cell-editor');
        assert(editor && editor.value === '7', 'typing a printable key opens replacement edit');
        key(editor, 'Enter');
        assert(a1.textContent.trim() === '7', 'Enter commits cell edit');
        assert(root.querySelector('[data-cell="A2"]').getAttribute('aria-selected') === 'true', 'Enter moves selection down');

        const a2 = root.querySelector('[data-cell="A2"]');
        key(a2, 'ArrowRight');
        assert(root.querySelector('[data-cell="B2"]').getAttribute('aria-selected') === 'true', 'arrow right moves selection');

        const b2 = root.querySelector('[data-cell="B2"]');
        formulaInput.value = '=A1+1';
        formulaInput.dispatchEvent(new Event('input', { bubbles: true }));
        key(formulaInput, 'Enter');
        assert(b2.textContent.trim() === '8', 'formula bar commits formula and displays evaluated value');
        assert(b2.getAttribute('aria-label').indexOf('B2') !== -1, 'cell exposes coordinate in accessible label');

        key(b2, 'z', { metaKey: true });
        assert(b2.textContent.trim() === '', 'undo is bound to cell edits');
        key(b2, 'z', { metaKey: true, shiftKey: true });
        assert(b2.textContent.trim() === '8', 'redo is bound to cell edits');

        key(b2, 'ArrowDown', { shiftKey: true });
        assert(root.querySelector('[data-cell="B3"]').classList.contains('in-range'), 'shift arrow extends visible range');

        editCell(root, 'A1', '2');
        editCell(root, 'A2', '3');
        const b1 = root.querySelector('[data-cell="B1"]');
        b1.dispatchEvent(new MouseEvent('mousedown', { bubbles: true, cancelable: true }));
        formulaInput.value = '=A1+A2';
        formulaInput.dispatchEvent(new Event('input', { bubbles: true }));
        key(formulaInput, 'Enter');
        assert(b1.textContent.trim() === '5', 'formula evaluates across precedent cells');
        editCell(root, 'A1', '4');
        assert(b1.textContent.trim() === '7', 'dependent formula updates after precedent edit');

        b1.dispatchEvent(new MouseEvent('mousedown', { bubbles: true, cancelable: true }));
        key(b1, 'Delete');
        assert(b1.textContent.trim() === '', 'Delete clears selected range through actions');
        key(b1, 'z', { metaKey: true });
        assert(b1.textContent.trim() === '7', 'undo restores deleted range as one action');

        editCell(root, 'A2', '10');
        b1.dispatchEvent(new MouseEvent('mousedown', { bubbles: true, cancelable: true }));
        formulaInput.value = '=A2';
        formulaInput.dispatchEvent(new Event('input', { bubbles: true }));
        key(formulaInput, 'Enter');
        assert(b1.textContent.trim() === '10', 'formula points at row before header actions');
        runHeaderAction(root, 'row-menu', '1', 'insert-row-before');
        assert(root.querySelector('[data-cell="A3"]').textContent.trim() === '10', 'row insert shifts cell contents down');
        assert(b1.textContent.trim() === '10', 'row insert keeps formula pointing at same data');
        runHeaderAction(root, 'row-menu', '1', 'delete-row');
        assert(root.querySelector('[data-cell="A2"]').textContent.trim() === '10', 'row delete shifts cell contents back up');
        assert(b1.textContent.trim() === '10', 'row delete keeps formula pointing at same data');

        runHeaderAction(root, 'column-menu', '1', 'insert-column-before');
        assert(root.querySelector('[data-cell="C1"]').textContent.trim() === '10', 'column insert shifts formula cell right');
        runHeaderAction(root, 'column-menu', '1', 'delete-column');
        assert(root.querySelector('[data-cell="B1"]').textContent.trim() === '10', 'column delete shifts formula cell back left');

        b2.dispatchEvent(new MouseEvent('mousedown', { bubbles: true, cancelable: true }));

        app.destroy();
        const restored = window.OracleSpreadsheet.createApp(root, {
          rows: 100,
          cols: 26,
          namespace: 'oracle-ui-test'
        });
        assert(root.querySelector('[data-cell="B1"]').textContent.trim() === '10', 'reload restores persisted formula display');
        assert(root.querySelector('[data-cell="B2"]').getAttribute('aria-selected') === 'true', 'reload restores selected cell');
        assert(root.querySelector('#formula-input').value === '=A1+1', 'reload restores raw formula in formula bar');
        restored.destroy();
        results.textContent = 'PASS';
      }

      try {
        run();
      } catch (error) {
        results.textContent = 'FAIL: ' + error.message;
        throw error;
      }
    }());
  </script>
</body>
</html>

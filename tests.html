<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <title>Spreadsheet tests</title>
</head>
<body>
  <div class="app" style="position:absolute; left:-10000px; top:0; width:400px; height:200px;">
    <header class="topbar">
      <button id="insert-row-above" type="button">Insert Row Above</button>
      <button id="insert-row-below" type="button">Insert Row Below</button>
      <button id="delete-row" type="button">Delete Row</button>
      <button id="insert-col-left" type="button">Insert Column Left</button>
      <button id="insert-col-right" type="button">Insert Column Right</button>
      <button id="delete-col" type="button">Delete Column</button>
    </header>
    <section class="formula-row">
      <div id="name-box" class="name-box">A1</div>
      <input id="formula-bar" class="formula-bar" aria-label="Formula bar" autocomplete="off">
      <div id="formula-status" class="formula-status" aria-live="polite">
        <span class="formula-status-label">Ready</span>
        <span class="formula-status-value">Blank</span>
      </div>
    </section>
    <main id="viewport" class="viewport" style="height:80px; width:220px; overflow:auto;">
      <div id="grid" class="grid"></div>
    </main>
  </div>
  <pre id="out">Running...</pre>
  <script src="app.js"></script>
  <script>
    document.dispatchEvent(new Event('DOMContentLoaded'));
    const out = document.getElementById('out');
    const failures = [];
    function test(name, fn) {
      try { fn(); }
      catch (error) { failures.push(name + ': ' + error.message); }
    }
    function equal(actual, expected) {
      if (actual !== expected) throw new Error('expected ' + expected + ', got ' + actual);
    }

    test('evaluates arithmetic and SUM ranges', () => {
      const sheet = new SpreadsheetModel(10, 10, 'test-arithmetic');
      sheet.setCell(0, 0, '2');
      sheet.setCell(1, 0, '3');
      sheet.setCell(2, 0, '=SUM(A1:A2)*2');
      equal(sheet.getDisplay(2, 0), '10');
    });

    test('recomputes dependents when precedents change', () => {
      const sheet = new SpreadsheetModel(10, 10, 'test-recompute');
      sheet.setCell(0, 0, '4');
      sheet.setCell(0, 1, '=A1+1');
      sheet.setCell(0, 0, '9');
      equal(sheet.getDisplay(0, 1), '10');
    });

    test('copies relative references by destination offset', () => {
      const adjusted = SpreadsheetModel.adjustFormula('=A1+$B$2+A$3+$C4', 2, 3);
      equal(adjusted, '=D3+$B$2+D$3+$C6');
    });

    test('detects circular references', () => {
      const sheet = new SpreadsheetModel(10, 10, 'test-circ');
      sheet.setCell(0, 0, '=B1');
      sheet.setCell(0, 1, '=A1');
      equal(sheet.getDisplay(0, 0), '#CIRC!');
    });

    test('insert row updates relative and absolute row references to moved data', () => {
      const sheet = new SpreadsheetModel(10, 10, 'test-insert-row-refs');
      sheet.setCell(0, 0, '10');
      sheet.setCell(1, 1, '=A1+$A$1+A$1+$A1');
      sheet.insertRow(0);
      equal(sheet.getCell(2, 1), '=A2+$A$2+A$2+$A2');
      equal(sheet.getDisplay(2, 1), '40');
    });

    test('delete column renders formulas that referenced deleted cells as #REF', () => {
      const sheet = new SpreadsheetModel(10, 10, 'test-delete-col-refs');
      sheet.setCell(0, 0, '7');
      sheet.setCell(0, 2, '=A1+$A$1');
      sheet.deleteCol(0);
      equal(sheet.getCell(0, 1), '=#REF!+#REF!');
      equal(sheet.getDisplay(0, 1), '#REF!');
    });

    test('compares empty cells as zero against numeric values', () => {
      const sheet = new SpreadsheetModel(10, 10, 'test-empty-comparison');
      sheet.setCell(0, 1, '=A1=0');
      sheet.setCell(1, 1, '=A1<1');
      equal(sheet.getDisplay(0, 1), 'TRUE');
      equal(sheet.getDisplay(1, 1), 'TRUE');
    });

    test('IF does not evaluate errors from unused branches', () => {
      const sheet = new SpreadsheetModel(10, 10, 'test-if-lazy-errors');
      sheet.setCell(0, 0, '=IF(TRUE,"ok",1/0)');
      sheet.setCell(1, 0, '=IF(FALSE,1/0,"safe")');
      equal(sheet.getDisplay(0, 0), 'ok');
      equal(sheet.getDisplay(1, 0), 'safe');
    });

    test('IF propagates errors from the condition', () => {
      const sheet = new SpreadsheetModel(10, 10, 'test-if-condition-error');
      sheet.setCell(0, 0, '=IF(1/0,"ok","safe")');
      equal(sheet.getDisplay(0, 0), '#DIV/0!');
    });

    test('uses injected benchmark storage namespace aliases', () => {
      localStorage.removeItem('run-a:cells');
      window.__BENCHMARK_STORAGE_NAMESPACE__ = 'run-a';
      const sheet = new SpreadsheetModel(10, 10);
      sheet.setCell(0, 0, '=SUM(A2:A3)');
      equal(localStorage.getItem('run-a:cells').includes('=SUM(A2:A3)'), true);
      delete window.__BENCHMARK_STORAGE_NAMESPACE__;
    });

    test('normalizes storage namespaces that already include a trailing colon', () => {
      localStorage.removeItem('run-colon:cells');
      localStorage.removeItem('run-colon::cells');
      const sheet = new SpreadsheetModel(10, 10, 'run-colon:');
      sheet.setCell(0, 0, '42');
      equal(localStorage.getItem('run-colon:cells').includes('42'), true);
      equal(localStorage.getItem('run-colon::cells'), null);
    });

    test('restores cells and selected cell without cross-run collisions', () => {
      localStorage.removeItem('run-b:cells');
      localStorage.removeItem('run-b:ui');
      localStorage.removeItem('run-c:cells');
      localStorage.removeItem('run-c:ui');
      const first = new SpreadsheetModel(10, 10, 'run-b');
      first.setCell(2, 1, '=A1+4');
      first.save({ row: 2, col: 1 });
      const restored = new SpreadsheetModel(10, 10, 'run-b');
      equal(restored.getCell(2, 1), '=A1+4');
      equal(restored.loadUi().row, 2);
      equal(restored.loadUi().col, 1);
      const isolated = new SpreadsheetModel(10, 10, 'run-c');
      equal(isolated.getCell(2, 1), '');
      equal(isolated.loadUi().row, undefined);
    });

    test('cell clicks restore grid keyboard focus after formula bar use', () => {
      const formula = document.getElementById('formula-bar');
      const cell = document.querySelector('.cell[data-row="0"][data-col="0"]');
      formula.focus();
      cell.dispatchEvent(new MouseEvent('mousedown', { bubbles: true, cancelable: true }));
      if (document.activeElement !== cell) throw new Error('expected clicked cell to receive focus');
    });

    test('keeps keyboard-selected active cell visible', () => {
      const viewport = document.getElementById('viewport');
      viewport.scrollTop = 0;
      for (let i = 0; i < 40; i++) document.dispatchEvent(new KeyboardEvent('keydown', { key: 'ArrowDown', bubbles: true }));
      if (viewport.scrollTop <= 0) throw new Error('expected viewport to scroll down to active cell');
    });

    if (failures.length) {
      out.textContent = failures.join('\n');
      throw new Error(failures.length + ' tests failed');
    }
    out.textContent = 'All tests passed';
  </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Spreadsheet Tests</title>
    <style>
      body {
        font-family: Arial, sans-serif;
        margin: 24px;
      }

      .pass {
        color: #0a7a33;
      }

      .fail {
        color: #b42318;
      }
    </style>
  </head>
  <body>
    <h1>Spreadsheet Tests</h1>
    <ul id="results"></ul>
    <script src="app.js"></script>
    <script>
      (function () {
        var results = document.getElementById("results");
        var failures = 0;

        function logResult(name, passed, details) {
          var item = document.createElement("li");
          item.className = passed ? "pass" : "fail";
          item.textContent = (passed ? "PASS: " : "FAIL: ") + name + (details ? " - " + details : "");
          results.appendChild(item);
          if (!passed) {
            failures += 1;
          }
        }

        function assertEqual(actual, expected, name) {
          if (actual !== expected) {
            throw new Error("expected " + expected + ", got " + actual);
          }
          logResult(name, true);
        }

        function run(name, testFn) {
          try {
            testFn();
          } catch (error) {
            logResult(name, false, error.message);
          }
        }

        run("createWorkbook exposes raw and display values", function () {
          var workbook = window.SpreadsheetApp.createWorkbook();
          workbook.setCell("A1", "1");
          workbook.setCell("A2", "2");
          workbook.setCell("A3", "=A1+A2");

          assertEqual(workbook.getRaw("A3"), "=A1+A2", "stores raw formula");
          assertEqual(workbook.getDisplay("A3"), "3", "evaluates arithmetic formula");
        });

        run("dependent cells recalculate when precedents change", function () {
          var workbook = window.SpreadsheetApp.createWorkbook();
          workbook.setCell("B1", "5");
          workbook.setCell("B2", "=B1*2");
          workbook.setCell("B1", "7");

          assertEqual(workbook.getDisplay("B2"), "14", "recomputes dependent formula");
        });

        run("formula helpers support SUM across ranges", function () {
          var workbook = window.SpreadsheetApp.createWorkbook();
          workbook.setCell("C1", "2");
          workbook.setCell("C2", "3");
          workbook.setCell("C3", "4");
          workbook.setCell("C4", "=SUM(C1:C3)");

          assertEqual(workbook.getDisplay("C4"), "9", "sums a vertical range");
        });

        run("pasting a relative formula shifts references by destination offset", function () {
          var workbook = window.SpreadsheetApp.createWorkbook();
          workbook.setCell("A1", "10");
          workbook.setCell("A2", "20");
          workbook.setCell("B1", "=A1+A2");

          workbook.copyRange("B1:B1");
          workbook.pasteRange("C1");

          assertEqual(workbook.getRaw("C1"), "=B1+B2", "shifts relative cell references in pasted formula");
        });

        run("absolute references stay anchored during paste", function () {
          var workbook = window.SpreadsheetApp.createWorkbook();
          workbook.setCell("A1", "5");
          workbook.setCell("A2", "6");
          workbook.setCell("B1", "=$A$1+A2");

          workbook.copyRange("B1:B1");
          workbook.pasteRange("C2");

          assertEqual(workbook.getRaw("C2"), "=$A$1+B3", "keeps absolute parts fixed while shifting relative parts");
        });

        document.title = failures ? "FAIL (" + failures + ")" : "PASS";
      })();
    </script>
  </body>
</html>

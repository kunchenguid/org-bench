<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Spreadsheet Tests</title>
    <style>
      body {
        font-family: Arial, sans-serif;
        margin: 24px;
      }

      .pass {
        color: #0a7a33;
      }

      .fail {
        color: #b42318;
      }
    </style>
  </head>
  <body>
    <h1>Spreadsheet Tests</h1>
    <ul id="results"></ul>
    <script src="app.js"></script>
    <script>
      (function () {
        var results = document.getElementById("results");
        var failures = 0;

        function logResult(name, passed, details) {
          var item = document.createElement("li");
          item.className = passed ? "pass" : "fail";
          item.textContent = (passed ? "PASS: " : "FAIL: ") + name + (details ? " - " + details : "");
          results.appendChild(item);
          if (!passed) {
            failures += 1;
          }
        }

        function assertEqual(actual, expected, name) {
          if (actual !== expected) {
            throw new Error("expected " + expected + ", got " + actual);
          }
          logResult(name, true);
        }

        function run(name, testFn) {
          try {
            testFn();
          } catch (error) {
            logResult(name, false, error.message);
          }
        }

        function clearSpreadsheetStorage() {
          localStorage.removeItem("amazon-sheet:cells");
          localStorage.removeItem("amazon-sheet:active");
        }

        function mountApp(options) {
          if (!options || !options.preserveStorage) {
            clearSpreadsheetStorage();
          }
          var existing = document.getElementById("app-test-root");
          if (existing) {
            existing.remove();
          }
          var root = document.createElement("div");
          root.id = "app-test-root";
          root.innerHTML = '<input id="formula-input" /><div id="spreadsheet"></div>';
          document.body.appendChild(root);
          window.SpreadsheetApp.createApp();
          return {
            formulaInput: document.getElementById("formula-input"),
            spreadsheet: document.getElementById("spreadsheet"),
          };
        }

        function dispatchDocumentKey(key, options) {
          document.dispatchEvent(new KeyboardEvent("keydown", Object.assign({ key: key, bubbles: true }, options || {})));
        }

        run("createWorkbook exposes raw and display values", function () {
          var workbook = window.SpreadsheetApp.createWorkbook();
          workbook.setCell("A1", "1");
          workbook.setCell("A2", "2");
          workbook.setCell("A3", "=A1+A2");

          assertEqual(workbook.getRaw("A3"), "=A1+A2", "stores raw formula");
          assertEqual(workbook.getDisplay("A3"), "3", "evaluates arithmetic formula");
        });

        run("dependent cells recalculate when precedents change", function () {
          var workbook = window.SpreadsheetApp.createWorkbook();
          workbook.setCell("B1", "5");
          workbook.setCell("B2", "=B1*2");
          workbook.setCell("B1", "7");

          assertEqual(workbook.getDisplay("B2"), "14", "recomputes dependent formula");
        });

        run("formula helpers support SUM across ranges", function () {
          var workbook = window.SpreadsheetApp.createWorkbook();
          workbook.setCell("C1", "2");
          workbook.setCell("C2", "3");
          workbook.setCell("C3", "4");
          workbook.setCell("C4", "=SUM(C1:C3)");

          assertEqual(workbook.getDisplay("C4"), "9", "sums a vertical range");
        });

        run("pasting a relative formula shifts references by destination offset", function () {
          var workbook = window.SpreadsheetApp.createWorkbook();
          workbook.setCell("A1", "10");
          workbook.setCell("A2", "20");
          workbook.setCell("B1", "=A1+A2");

          workbook.copyRange("B1:B1");
          workbook.pasteRange("C1");

          assertEqual(workbook.getRaw("C1"), "=B1+B2", "shifts relative cell references in pasted formula");
        });

        run("absolute references stay anchored during paste", function () {
          var workbook = window.SpreadsheetApp.createWorkbook();
          workbook.setCell("A1", "5");
          workbook.setCell("A2", "6");
          workbook.setCell("B1", "=$A$1+A2");

          workbook.copyRange("B1:B1");
          workbook.pasteRange("C2");

          assertEqual(workbook.getRaw("C2"), "=$A$1+B3", "keeps absolute parts fixed while shifting relative parts");
        });

        run("formula bar and in-cell editing share one draft", function () {
          var ui = mountApp({ preserveStorage: true });
          ui.spreadsheet.querySelector('[data-cell="A1"]').click();
          dispatchDocumentKey("1");

          var editor = ui.spreadsheet.querySelector('[data-editor="A1"]');
          editor.value = "123";
          editor.dispatchEvent(new Event("input", { bubbles: true }));

          assertEqual(ui.formulaInput.value, "123", "formula bar mirrors the in-cell draft");

          ui.formulaInput.focus();
          ui.formulaInput.dispatchEvent(new FocusEvent("focus"));
          assertEqual(ui.formulaInput.value, "123", "formula bar keeps the same draft when taking over editing");
        });

        run("keyboard paste writes shifted formulas into persisted app state", function () {
          localStorage.setItem("amazon-sheet:cells", JSON.stringify({ A1: "10", A2: "20", B1: "=A1+A2" }));
          localStorage.setItem("amazon-sheet:active", "B1");
          var ui = mountApp({ preserveStorage: true });
          ui.spreadsheet.querySelector('[data-cell="B1"]').click();

          dispatchDocumentKey("c", { ctrlKey: true });
          dispatchDocumentKey("ArrowRight");
          dispatchDocumentKey("v", { ctrlKey: true });

          var persisted = JSON.parse(localStorage.getItem("amazon-sheet:cells") || "{}");
          assertEqual(persisted.C1, "=B1+B2", "paste keeps source-origin shifting in app state");
          assertEqual(ui.spreadsheet.querySelector('[data-cell="C1"]').textContent.trim(), "30", "pasted formula renders in the grid");
        });

        document.title = failures ? "FAIL (" + failures + ")" : "PASS";
      })();
    </script>
  </body>
</html>

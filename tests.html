<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <title>Spreadsheet Tests</title>
</head>
<body>
  <pre id="out">Running...</pre>
  <script src="app.js"></script>
  <script>
    const out = document.getElementById('out');
    const tests = [];
    function test(name, fn) { tests.push({ name, fn }); }
    function assertEqual(actual, expected, label) {
      if (actual !== expected) throw new Error(`${label || 'value'}: expected ${expected}, got ${actual}`);
    }

    test('evaluates formulas with references and ranges', () => {
      const sheet = new window.SpreadsheetModel({ rows: 10, cols: 5, storageKey: 'test-a' });
      sheet.setRaw(0, 0, '10');
      sheet.setRaw(1, 0, '5');
      sheet.setRaw(2, 0, '=A1+A2*2');
      sheet.setRaw(3, 0, '=SUM(A1:A3)');
      assertEqual(sheet.getDisplay(2, 0), '20', 'formula display');
      assertEqual(sheet.getDisplay(3, 0), '35', 'range formula');
    });

    test('detects circular references', () => {
      const sheet = new window.SpreadsheetModel({ rows: 10, cols: 5, storageKey: 'test-b' });
      sheet.setRaw(0, 0, '=B1');
      sheet.setRaw(0, 1, '=A1');
      assertEqual(sheet.getDisplay(0, 0), '#CIRC!', 'circular display');
    });

    test('adjusts relative references when copied', () => {
      const sheet = new window.SpreadsheetModel({ rows: 10, cols: 5, storageKey: 'test-c' });
      assertEqual(sheet.adjustFormulaForMove('=A1+$A1+A$1+$A$1', 0, 1, 2, 2), '=B3+$A3+B$1+$A$1', 'adjusted formula');
    });

    test('IF only evaluates the selected branch', () => {
      const sheet = new window.SpreadsheetModel({ rows: 10, cols: 5, storageKey: 'test-if' });
      sheet.setRaw(0, 0, '=IF(FALSE,1/0,7)');
      sheet.setRaw(1, 0, '=IF(TRUE,9,1/0)');
      assertEqual(sheet.getDisplay(0, 0), '7', 'false branch');
      assertEqual(sheet.getDisplay(1, 0), '9', 'true branch');
    });

    test('copies formula blocks relative to the copied source', () => {
      const sheet = new window.SpreadsheetModel({ rows: 10, cols: 5, storageKey: 'test-d' });
      const pasted = sheet.adjustFormulaForMove('=A1', 0, 0, 1, 1);
      assertEqual(pasted, '=B2', 'copied formula');
    });

    test('persists raw formulas and selection per run namespace without collisions', () => {
      localStorage.removeItem('run-one:shared-state');
      localStorage.removeItem('run-two:shared-state');

      const runOne = new window.SpreadsheetModel({ rows: 10, cols: 5, storageKey: 'shared-state', namespace: 'run-one' });
      runOne.setRaw(0, 0, '4');
      runOne.setRaw(0, 1, '=A1*3');
      runOne.selection = { r1: 0, c1: 1, r2: 0, c2: 1, activeRow: 0, activeCol: 1 };
      runOne.save();

      const runTwo = new window.SpreadsheetModel({ rows: 10, cols: 5, storageKey: 'shared-state', namespace: 'run-two' });
      runTwo.setRaw(0, 0, '99');
      runTwo.selection = { r1: 2, c1: 2, r2: 2, c2: 2, activeRow: 2, activeCol: 2 };
      runTwo.save();

      const reloadedOne = new window.SpreadsheetModel({ rows: 10, cols: 5, storageKey: 'shared-state', namespace: 'run-one' });
      const reloadedTwo = new window.SpreadsheetModel({ rows: 10, cols: 5, storageKey: 'shared-state', namespace: 'run-two' });

      assertEqual(reloadedOne.storageKey, 'run-one:shared-state', 'run one storage key');
      assertEqual(reloadedTwo.storageKey, 'run-two:shared-state', 'run two storage key');
      assertEqual(reloadedOne.getRaw(0, 1), '=A1*3', 'raw formula survives reload');
      assertEqual(reloadedOne.getDisplay(0, 1), '12', 'formula recalculates after reload');
      assertEqual(reloadedOne.selection.activeRow, 0, 'run one selection row');
      assertEqual(reloadedOne.selection.activeCol, 1, 'run one selection col');
      assertEqual(reloadedTwo.getRaw(0, 0), '99', 'run two cell survives separately');
      assertEqual(reloadedTwo.selection.activeRow, 2, 'run two selection row');
      assertEqual(reloadedTwo.selection.activeCol, 2, 'run two selection col');
    });

    test('COUNT ignores empty cells in ranges', () => {
      const sheet = new window.SpreadsheetModel({ rows: 10, cols: 5, storageKey: 'test-e' });
      sheet.setRaw(0, 0, '3');
      sheet.setRaw(2, 0, 'text');
      sheet.setRaw(3, 0, '=COUNT(A1:A3)');
      assertEqual(sheet.getDisplay(3, 0), '1', 'count display');
    });

    (async function run() {
      const failures = [];
      for (const t of tests) {
        try { await t.fn(); }
        catch (e) { failures.push(`${t.name}: ${e.message}`); }
      }
      out.textContent = failures.length ? `FAIL\n${failures.join('\n')}` : `PASS ${tests.length}`;
      document.title = failures.length ? 'FAIL' : 'PASS';
    })();
  </script>
</body>
</html>
